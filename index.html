<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foamy — Forecast</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=Oswald:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #000000;
    --surface: #0b0f19;
    --surface-2: #121a2b;
    --border: rgba(222,242,241,0.09);
    --border-strong: rgba(222,242,241,0.18);
    --ink: #a9c4c2;
    --ink-dim: #6b8583;
    --ink-bright: #f4fdfc;
    --accent: #4fd1c5;
    --accent-soft: #9be3de;
    --accent-wash: rgba(79,209,197,0.10);
    --alert: #e0524f;
    --sun: #e0b84f;
    --font-display: 'Archivo', ui-sans-serif, system-ui, sans-serif;
    --font-data: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font-display);
    -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column;
  }
  ::selection { background: var(--accent); color: #00201d; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .tabular { font-variant-numeric: tabular-nums; }
  @keyframes needleSettle { from { transform: rotate(0deg); } to { transform: rotate(var(--needle-deg)); } }
  .needle { animation: needleSettle 1s cubic-bezier(.22,1,.36,1) forwards; transform-origin: 40px 40px; }
  @keyframes drawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .drawer-in { animation: drawerIn .35s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp .4s ease-out forwards; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .01ms !important; }
  }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 20px 20px 64px; width: 100%; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; padding: 20px 0 18px; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark { width: 34px; height: 34px; display: block; border-radius: 50%; flex-shrink: 0; }
  .drawer-title-row { display: flex; align-items: center; gap: 14px; }
  .drawer-brand-mark { width: 40px; height: 40px; display: block; border-radius: 50%; flex-shrink: 0; }
  .brand-text { display: flex; flex-direction: column; line-height: 1; gap: 4px; }
  .brand-name { font-family: 'Oswald', var(--font-display); font-weight: 700; font-size: 22px; color: var(--ink-bright); letter-spacing: -0.01em; text-transform: uppercase; }
  .brand-tag { font-family: var(--font-data); font-weight: 500; font-size: 10.5px; color: var(--accent); text-transform: uppercase; letter-spacing: .16em; }

  .filters { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; min-width: 0; flex: 1 1 320px; max-width: 100%; }
  .search-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; width: 100%; }
  .search-input { background: var(--surface); border: 1px solid var(--border-strong); color: var(--ink-bright); font-family: var(--font-data); font-size: 12px; padding: 7px 10px; border-radius: 4px; flex: 1 1 140px; min-width: 0; }
  .search-input::placeholder { color: var(--ink-dim); }
  .chip-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .chip-btn { font-family: var(--font-data); font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-dim); background: transparent; border: 1px solid var(--border); padding: 5px 9px; border-radius: 4px; cursor: pointer; transition: border-color .12s, color .12s; }
  .chip-btn:hover { border-color: var(--border-strong); color: var(--ink); }
  .chip-btn[aria-pressed="true"] { color: #00201d; background: var(--accent); border-color: var(--accent); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; margin-top: 20px; }
  .spot-card { text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: border-color .15s, background .15s; }
  .spot-card:hover { border-color: var(--accent); background: var(--surface-2); }
  .spot-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .spot-card-name { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--ink-bright); line-height: 1.25; }
  .spot-card-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-top: 2px; }
  .webcam-badge { display: inline-flex; color: var(--accent); }
  .spot-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 10px; }
  .spot-card-fav { display: inline-flex; align-items: center; justify-content: center; color: var(--ink-dim); cursor: pointer; padding: 4px; margin: -4px; border-radius: 50%; }
  .spot-card-fav:hover { color: var(--accent-soft); background: var(--surface-2); }
  .spot-card-fav.is-active { color: var(--sun); }
  .spot-card-cta { font-family: var(--font-data); font-size: 10.5px; color: var(--ink-dim); }
  .spot-card:hover .spot-card-cta { color: var(--accent); }

  /* Home a due livelli: prima le regioni (oggi solo Puglia, ma pensata per
     più regioni italiane in futuro), poi — cliccando una regione — la
     griglia spot di sempre, filtrata su quella regione. */
  .region-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-top: 20px; }
  .region-card { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px 16px; cursor: pointer; transition: border-color .15s, background .15s; }
  .region-card:hover { border-color: var(--accent); background: var(--surface-2); }
  .region-map { width: 56px; height: 84px; flex-shrink: 0; }
  .region-map path { fill: var(--accent-soft); transition: fill .15s; }
  .region-card:hover .region-map path { fill: var(--accent); }
  .region-name { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--ink-bright); }
  .region-count { font-family: var(--font-data); font-size: 10.5px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .08em; }
  .back-to-regions { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-data); font-size: 11px; font-weight: 600; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .06em; background: transparent; border: none; cursor: pointer; padding: 0; margin: 0 0 14px; }
  .back-to-regions:hover { color: var(--accent); }

  #emptyState { text-align: center; padding: 60px 0; }
  #emptyState p:first-child { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--ink); margin: 0 0 6px; }
  #emptyState p:nth-child(2) { font-family: var(--font-data); font-size: 12px; color: var(--ink-dim); margin: 0 0 16px; }
  #resetFilters { font-family: var(--font-data); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink); background: transparent; border: 1px solid var(--border-strong); padding: 8px 18px; border-radius: 20px; cursor: pointer; }
  #resetFilters:hover { border-color: var(--accent); color: var(--accent); }

  footer { border-top: 1px solid var(--border); padding: 20px; margin-top: auto; }
  footer p { max-width: 1180px; margin: 0 auto; font-family: var(--font-data); font-size: 10.5px; color: var(--ink-dim); }

  /* ---------- Drawer ---------- */
  .drawer-overlay { position: fixed; inset: 0; z-index: 50; }
  .drawer-panel { position: relative; width: 100%; height: 100%; background: var(--bg); overflow-y: auto; }
  .drawer-head { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 22px; display: flex; align-items: flex-start; justify-content: space-between; position: sticky; top: 0; z-index: 2; }
  .drawer-head-inner { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; align-items: flex-start; justify-content: space-between; }
  .drawer-coast { font-family: var(--font-data); font-size: 10.5px; text-transform: uppercase; letter-spacing: .14em; color: var(--accent); margin: 0 0 4px; }
  .drawer-title { font-family: var(--font-display); font-weight: 900; font-size: 30px; color: var(--ink-bright); margin: 0; line-height: 1.1; }
  .drawer-close { background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: 50%; width: 38px; height: 38px; color: var(--ink-dim); font-size: 22px; line-height: 1; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .drawer-close:hover { color: var(--ink-bright); border-color: var(--accent); }
  .drawer-body-inner { max-width: 1400px; margin: 0 auto; }
  .drawer-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
  .panel-label { font-family: var(--font-data); font-weight: 600; font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-bright); margin: 0 0 12px; }

  /* Punto rosso statico: segnala che vento/swell qui sotto sono le
     condizioni attuali (in tempo reale), non parte del forecast a 7 giorni
     più sotto nello stesso pannello. */
  .live-badge { display: flex; align-items: center; gap: 6px; font-family: var(--font-data); font-weight: 700; font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 14px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #e0524f; flex-shrink: 0; }

  .wind-card { display: flex; align-items: center; gap: 22px; }
  .arrow-widget { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; width: 74px; }
  .arrow-widget svg { display: block; }
  .arrow-cardinal { font-family: var(--font-data); font-weight: 600; font-size: 16px; color: var(--ink-bright); }
  .arrow-name { font-family: var(--font-data); font-size: 10px; color: var(--accent-soft); text-transform: uppercase; letter-spacing: .06em; }
  .wind-numbers { display: flex; flex-direction: column; gap: 8px; }
  .num-primary { display: flex; align-items: baseline; gap: 6px; }
  .num-primary .val { font-family: var(--font-data); font-weight: 600; font-size: 48px; color: var(--accent); line-height: 1; }
  .num-primary .unit { font-family: var(--font-data); font-size: 13px; color: var(--ink-dim); }
  .num-secondary { font-family: var(--font-data); font-size: 12px; color: var(--ink); }
  .num-secondary b { color: var(--ink-bright); font-weight: 600; }

  .wave-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .wave-height-group { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .wave-height { display: flex; align-items: baseline; gap: 6px; }
  .wave-height .val { font-family: var(--font-data); font-weight: 600; font-size: 48px; color: var(--ink-bright); line-height: 1; }
  .wave-height .unit { font-family: var(--font-data); font-size: 13px; color: var(--ink-dim); }
  .wave-period { display: flex; align-items: baseline; gap: 5px; }
  .wave-period .val { font-family: var(--font-data); font-weight: 600; font-size: 24px; color: var(--accent-soft); line-height: 1; }
  .wave-period .unit { font-family: var(--font-data); font-size: 10.5px; color: var(--ink-dim); }
  .kj-readout { text-align: right; }
  .kj-readout .val { font-family: var(--font-data); font-weight: 600; font-size: 22px; color: var(--ink-bright); }
  .kj-readout .lbl { font-family: var(--font-data); font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .1em; }
  .swell-dir { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-family: var(--font-data); font-size: 12px; font-weight: 600; color: var(--ink-bright); }

  .water-widget { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 20px; flex-wrap: wrap; }
  .water-item { display: flex; align-items: center; gap: 8px; }
  .water-icon { color: var(--accent-soft); flex-shrink: 0; }
  .water-item .val { font-family: var(--font-data); font-weight: 600; font-size: 19px; color: var(--ink-bright); }
  .water-item .lbl { font-family: var(--font-data); font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .08em; }
  .tide-trend.rising { color: var(--accent); }
  .tide-trend.falling { color: var(--alert); }

  .top-banners { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; }
  .swell-block { padding-left: 20px; border-left: 1px solid var(--border); }
  @media (max-width: 860px) {
    .top-banners { grid-template-columns: 1fr; gap: 16px; }
    .swell-block { padding-left: 0; border-left: none; padding-top: 16px; border-top: 1px solid var(--border); }
  }

  .forecast-sub-label { font-family: var(--font-data); font-weight: 600; font-size: 12px; color: var(--ink-bright); margin: 0 0 8px; }
  /* Indice a sinistra dei due grafici: spiega cosa rappresenta ogni riga
     (vento/raffiche/direzione, altezza/periodo/energia/direzione) senza
     dover indovinare scorrendo. Fuori dal contenitore che scrolla in
     orizzontale (resta fisso), altezze delle righe (.forecast-legend-item)
     identiche ai relativi blocchi nell'SVG — stesse costanti JS usate per
     disegnarli, quindi restano allineate anche se quei numeri cambiano. */
  .forecast-body-row { display: flex; align-items: flex-start; gap: 10px; }
  .forecast-legend-col { display: flex; flex-direction: column; flex-shrink: 0; width: 84px; padding-right: 10px; border-right: 1px solid var(--border); }
  .forecast-legend-block { position: relative; }
  .forecast-legend-item { position: absolute; left: 0; right: 0; display: flex; align-items: center; font-family: var(--font-data); font-size: 10px; line-height: 1.2; color: var(--ink-dim); }
  /* Sotto i 640px non c'è spazio per l'indice a fianco senza schiacciare i
     grafici: diventa una lista compatta "a capo libero" sopra ai grafici,
     invece delle righe allineate in verticale (che qui perderebbero senso,
     visto che non sono più affiancate a nulla). Deve stare DOPO le regole
     base qui sopra: stessa specificità di classe, quindi in un pareggio
     vince l'ultima dichiarata nel foglio di stile, non quella "più giusta". */
  @media (max-width: 640px) {
    .forecast-body-row { flex-direction: column; }
    .forecast-legend-col { flex-direction: row; flex-wrap: wrap; width: auto; column-gap: 14px; row-gap: 4px; border-right: none; border-bottom: 1px solid var(--border); padding: 0 0 10px; margin-bottom: 10px; }
    .forecast-legend-block { display: contents; }
    .forecast-legend-item { position: static; height: auto !important; }
  }
  /* Vento e mare condividono un solo scorrimento orizzontale: un solo
     contenitore invece di due, così i due grafici si muovono sempre
     insieme e i loro divisori di fine giornata restano allineati. Flex
     column + align-items:flex-start perché le due <svg> hanno una
     larghezza fissa in px (impostata via JS) più larga del contenitore,
     mentre le etichette "Vento"/"Mare" restano della loro larghezza
     naturale invece di stirarsi al 100%. */
  .forecast-chart-wrap { position: relative; display: flex; flex-direction: column; align-items: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; touch-action: pan-x; overscroll-behavior-x: contain; scrollbar-width: thin; scrollbar-color: rgba(222,242,241,0.14) transparent; }
  .forecast-chart-wrap::-webkit-scrollbar { height: 3px; }
  .forecast-chart-wrap::-webkit-scrollbar-track { background: transparent; }
  .forecast-chart-wrap::-webkit-scrollbar-thumb { background: rgba(222,242,241,0.14); border-radius: 2px; }
  .forecast-chart-wrap::-webkit-scrollbar-thumb:hover { background: rgba(222,242,241,0.3); }
  /* Divisori di fine giornata: un solo overlay assoluto che copre l'intera
     altezza del banner (vento + mare), invece di due <line> separate per
     ciascuna <svg> — così la linea è visivamente continua, senza "buco" in
     corrispondenza dell'etichetta "Mare". Posizionato/misurato via JS dopo
     il render di entrambi i grafici (vedi renderForecastDayDividers). */
  .forecast-day-dividers { position: absolute; top: 0; left: 0; width: 0; height: 0; pointer-events: none; }
  .forecast-day-divider-line { position: absolute; width: 1.5px; background: rgba(222,242,241,0.3); }
  .legend-swatch--gradient {
    width: 46px; height: 6px; border-radius: 2px;
    background: linear-gradient(90deg, #fff 0%, #4fd1c5 18%, #86e08a 31%, #f2d94e 44%, #f2994e 60%, #e0524f 78%, #b06ae0 100%);
  }

  .lbl { font-family: var(--font-data); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-dim); margin: 0 0 3px; }
  .val-text, .desc-text { font-size: 13px; color: var(--ink); line-height: 1.5; margin: 0; }
  .desc-text { margin-top: 4px; }

  .webcam-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .webcam-provider-name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--ink-bright); }
  .webcam-btn { font-family: var(--font-data); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; background: var(--accent); color: #00201d; padding: 7px 14px; border-radius: 20px; text-decoration: none; white-space: nowrap; }
  .webcam-btn:hover { background: var(--accent-soft); }

  .footer-ts { font-family: var(--font-data); font-size: 10.5px; color: var(--ink-dim); text-align: center; }

  /* Mobile: la stessa gerarchia visiva di sempre, ma senza i doppi margini
     (wrap 20px + panel 24px = 44px di "niente" per lato, prima di arrivare
     al testo) e senza card regione alte 183px per una singola riga di
     informazione ("Puglia · 20 spot") — misurato via getBoundingClientRect
     su un iPhone SE (375px) prima di questa modifica. Solo geometria
     (padding, dimensioni, un riposizionamento a griglia): nessun
     comportamento o contenuto cambia rispetto a desktop/tablet. */
  @media (max-width: 640px) {
    .wrap { padding: 14px 14px 40px; }
    .topbar { padding: 14px 0 12px; gap: 12px; }
    .brand-mark { width: 28px; height: 28px; }
    .brand-name { font-size: 18px; }
    .brand-tag { font-size: 9px; }

    .grid, .region-grid { margin-top: 14px; gap: 10px; }
    .spot-card { padding: 12px 14px; }

    /* Card regione: da riquadro verticale (mappa 84px + testo centrato
       sotto) a riga compatta stile lista — mappa a sinistra su due righe,
       nome sopra e conteggio sotto a destra. Stesso markup di sempre
       (svg + due <span>), solo riposizionati con CSS grid. */
    .region-card { display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto auto; align-items: center; column-gap: 14px; row-gap: 2px; text-align: left; padding: 12px 14px; }
    .region-map { grid-row: 1 / 3; grid-column: 1; width: 40px; height: 60px; }
    .region-name { grid-row: 1; grid-column: 2; font-size: 15px; }
    .region-count { grid-row: 2; grid-column: 2; }

    footer { padding: 14px; }

    /* Scheda spot (drawer): drawer-body e panel avevano ciascuno il proprio
       padding laterale, sommandosi; qui si riducono entrambi invece di
       toglierne uno solo, per non arrivare al testo attaccato al bordo. */
    .drawer-head { padding: 14px 16px; }
    .drawer-brand-mark { width: 32px; height: 32px; }
    .drawer-title { font-size: 22px; }
    .drawer-body { padding: 12px; gap: 12px; }
    .panel { padding: 14px; border-radius: 8px; }

    /* Forecast: il banner Live sopra resta un pannello com'è (a richiesta),
       ma questa sezione perde il "riquadro" (sfondo/bordo/arrotondamento) e
       si estende a schermo intero, annullando il padding di drawer-body
       con un margine negativo — più spazio reale per i grafici, che sono
       la parte che conta qui. */
    .panel.panel-forecast { background: none; border: none; border-radius: 0; padding: 14px 8px; margin: 0 -12px; }
  }
</style>
</head>
<body>

<div class="wrap">

let SPOTS = FALLBACK_SPOTS;

async function loadSpots() {
  try {
    const res = await fetch(`${API_BASE}/api/spots`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const spots = Array.isArray(data) ? data : data.spots;
    if (Array.isArray(spots) && spots.length) return spots;
    throw new Error("empty spots list");
  } catch {
    return FALLBACK_SPOTS;
  }
}

function classifySeaState(height) {
  if (height == null) return ["Dato non disponibile", "#6b8583", "N/D", 0];
  if (height < 0.1) return ["Forza 1 - Quasi Calmo", "#4fd1c5", "Quasi calmo", 1];
  if (height < 0.5) return ["Forza 2 - Poco Mosso", "#9be3de", "Poco mosso", 2];
  if (height < 1.25) return ["Forza 3 - Mosso", "#e0b84f", "Mosso", 3];
  if (height < 2.5) return ["Forza 4 - Molto Mosso", "#e0954f", "Molto mosso", 4];
  return ["Forza 5 - Agitato", "#e0524f", "Agitato", 5];
}

// Indice energia in stile Surf-Forecast (altezza² × periodo × 10), non la
// formula oceanografica reale (che darebbe kW/m a una cifra). Costante
// tarata confrontando punto per punto con i valori orari mostrati da
// surf-forecast.com per lo stesso spot — vedi calculateWaveEnergyKJ nel
// backend per la stessa formula lato server.
function energyFrom(height, period) {
  if (height == null || period == null) return null;
  return Math.round(height * height * period * 10);
}

// Una raffica non può mai essere fisicamente più bassa della velocità
// media: nei fallback qui sotto velocità e raffiche vengono da due modelli
// diversi (ICON vs GFS), ognuno coerente solo al proprio interno.
function gustFloor(gusts, speed) {
  if (gusts == null) return speed;
  if (speed == null) return gusts;
  return Math.max(gusts, speed);
}

// Punteggio qualità surf (Flat..Perfect) — porting 1:1 di
// calculateSurfRating() nel backend (waveCalculations.js), usato solo nel
// fallback quando il backend non risponde (il percorso principale legge
// sea.surfRating già calcolato server-side, stessa logica). Formula
// calibrata sul Mediterraneo, non la logica oceanica standard: vedi il
// backend per i dettagli/commenti completi sulla tabella e le zone vento.
const SURF_RATING_LEVELS = ["Flat", "Bad", "Fair", "Good", "Great", "Perfect"];
const SURF_FLAT_THRESHOLD_M = 0.2;
const SURF_RATING_BASE_TABLE = [
  ["Bad", "Bad", "Bad", "Fair", "Good"],
  ["Bad", "Bad", "Fair", "Good", "Good"],
  ["Bad", "Fair", "Good", "Great", "Great"],
  ["Fair", "Good", "Great", "Great", "Great"],
  ["Fair", "Good", "Great", "Great", "Great"],
];
function surfHeightRowIndex(h) {
  if (h < 0.3) return 0;
  if (h < 0.5) return 1;
  if (h < 0.8) return 2;
  if (h < 1.2) return 3;
  return 4;
}
function surfPeriodColIndex(p) {
  if (p < 4) return 0;
  if (p < 5.5) return 1;
  if (p < 7) return 2;
  if (p < 9) return 3;
  return 4;
}
function bumpSurfLevel(level) {
  const idx = SURF_RATING_LEVELS.indexOf(level);
  return SURF_RATING_LEVELS[Math.min(idx + 1, SURF_RATING_LEVELS.length - 1)];
}
// Declassamento di una posizione (non un tetto fisso "mai sopra Good") —
// stessa correzione fatta nel backend dopo il caso Otranto.
function downgradeSurfLevel(level) {
  const idx = SURF_RATING_LEVELS.indexOf(level);
  return SURF_RATING_LEVELS[Math.max(idx - 1, 0)];
}
function surfAngularDiff(a, b) {
  let diff = (a - b) % 360;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return diff;
}
function surfWindZoneEffect(windDirectionDeg, windSpeedKn, coastOrientationDeg) {
  if (windSpeedKn < 5) return "bump";
  const offshoreDeg = (coastOrientationDeg + 180) % 360;
  const delta = Math.abs(surfAngularDiff(windDirectionDeg, offshoreDeg));
  if (delta <= 45) return "bump";
  if (delta <= 90) return windSpeedKn <= 15 ? "bump" : "none";
  return windSpeedKn <= 15 ? "none" : "cap";
}
function calculateSurfRating(waveHeightM, wavePeriodS, windSpeedKn, windDirectionDeg, coastOrientationDeg) {
  if (waveHeightM == null) {
    return { rating: null, baseLevel: null, windEffect: "unavailable" };
  }
  let baseLevel;
  if (waveHeightM < SURF_FLAT_THRESHOLD_M) {
    baseLevel = "Flat";
  } else if (wavePeriodS == null) {
    return { rating: null, baseLevel: null, windEffect: "unavailable" };
  } else {
    baseLevel = SURF_RATING_BASE_TABLE[surfHeightRowIndex(waveHeightM)][surfPeriodColIndex(wavePeriodS)];
  }
  if (windSpeedKn == null || windDirectionDeg == null || coastOrientationDeg == null) {
    return { rating: baseLevel, baseLevel, windEffect: "unavailable" };
  }
  const zoneEffect = surfWindZoneEffect(windDirectionDeg, windSpeedKn, coastOrientationDeg);
  let rating = baseLevel;
  let windEffect = "none";
  if (baseLevel !== "Flat" && baseLevel !== "Bad") {
    if (zoneEffect === "bump") {
      rating = bumpSurfLevel(baseLevel);
      windEffect = "bump";
    } else if (zoneEffect === "cap") {
      const downgraded = downgradeSurfLevel(baseLevel);
      if (downgraded !== baseLevel) {
        rating = downgraded;
        windEffect = "cap";
      }
    }
  }
  return { rating, baseLevel, windEffect };
}

// Colori solo per i 4 livelli mostrati all'utente (Flat/Bad non hanno mai
// un indicatore visibile — vedi SURF_RATING_VISIBLE più sotto).
const SURF_RATING_COLORS = {
  Fair: "#e0cf4f",
  Good: "#a3c65a",
  Great: "#86e08a",
  Perfect: "#b06ae0",
};
// Solo questi livelli mostrano il logo colorato: l'obiettivo è segnalare
// quando conviene surfare, non evidenziare quando non conviene.
const SURF_RATING_VISIBLE = new Set(["Fair", "Good", "Great", "Perfect"]);

function round(v, d) {
  if (v == null) return null;
  const f = Math.pow(10, d);
  return Math.round(v * f) / f;
}

async function fetchJSON(url, timeoutMs) {
  const controller = timeoutMs ? new AbortController() : null;
  const timer = controller ? setTimeout(() => controller.abort(), timeoutMs) : null;
  try {
    const res = await fetch(url, controller ? { signal: controller.signal } : undefined);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } finally {
    if (timer) clearTimeout(timer);
  }
}

async function fetchCurrentConditions(spot) {
  try {
    const data = await fetchJSON(`${API_BASE}/api/forecast/${spot.id}`);
    return {
      windSpeed: data.wind.speedKn,
      windGusts: data.wind.gustsKn,
      windDir: data.wind.directionDeg,
      height: data.sea.waveHeightM ?? null,
      period: data.sea.wavePeriodS ?? null,
      waveDir: data.sea.waveDirectionDeg ?? null,
      energy: data.sea.waveEnergyKJ ?? null,
      seaStateLabel: data.sea.seaState || null,
      surfRating: data.sea.surfRating ?? null,
      degraded: !!data.sea.copernicusDegraded,
      backendUnreachable: false,
    };
  } catch {
    // Backend irraggiungibile (es. quota Open-Meteo esaurita sull'IP
    // condiviso di Render): chiediamo vento E mare direttamente da questo
    // browser, che ha il suo IP personale, separato da quello del backend.
    // Il vento resta essenziale (se fallisce, propaghiamo l'errore); il
    // mare degrada in autonomia — niente onda non blocca il vento.
    const [windResult, marineResult, gustsResult] = await Promise.allSettled([
      fetchJSON("https://api.open-meteo.com/v1/forecast?" + new URLSearchParams({
        latitude: spot.lat, longitude: spot.lon,
        current: "wind_speed_10m,wind_gusts_10m,wind_direction_10m",
        wind_speed_unit: "kn", timezone: "Europe/Rome",
      })),
      fetchJSON("https://marine-api.open-meteo.com/v1/marine?" + new URLSearchParams({
        latitude: spot.lat, longitude: spot.lon,
        current: "wave_height,swell_wave_period,wave_direction",
        timezone: "Europe/Rome",
      })),
      // Raffiche da GFS (taratura Windguru, come nel backend): il blocco
      // "current" di Open-Meteo non supporta più modelli in una chiamata,
      // quindi serve una richiesta separata. Se fallisce, si ricade sulle
      // raffiche del modello principale qui sopra.
      fetchJSON("https://api.open-meteo.com/v1/forecast?" + new URLSearchParams({
        latitude: spot.lat, longitude: spot.lon,
        current: "wind_gusts_10m",
        wind_speed_unit: "kn", timezone: "Europe/Rome",
        models: "gfs_seamless",
      })),
    ]);
    if (windResult.status === "rejected") throw windResult.reason;

    const wind = windResult.value;
    const marine = marineResult.status === "fulfilled" ? marineResult.value : null;
    const gfsGusts = gustsResult.status === "fulfilled" ? gustsResult.value?.current?.wind_gusts_10m : null;
    const height = marine?.current?.wave_height ?? null;
    const period = marine?.current?.swell_wave_period ?? null;
    const waveDir = marine?.current?.wave_direction ?? null;

    // Punteggio surf calcolato qui in locale (stessa formula del backend,
    // vedi calculateSurfRating sopra): il backend non risponde in questo
    // ramo, quindi non c'è sea.surfRating già pronto da leggere. Solo per
    // spot con disciplina "wave" e coastOrientationDeg noto (solo Puglia
    // per ora) — altrimenti calculateSurfRating() degrada da sola.
    const surfRating = spot.disciplines.includes("wave")
      ? calculateSurfRating(height, period, wind.current.wind_speed_10m, wind.current.wind_direction_10m, spot.coastOrientationDeg)
      : null;

    return {
      windSpeed: wind.current.wind_speed_10m,
      windGusts: gustFloor(gfsGusts ?? wind.current.wind_gusts_10m, wind.current.wind_speed_10m),
      windDir: wind.current.wind_direction_10m,
      height, period, waveDir,
      energy: energyFrom(height, period),
      seaStateLabel: null,
      surfRating,
      degraded: true,
      backendUnreachable: true,
    };
  }
}

function middayValue(hourly, variable, date) {
  if (!hourly?.time) return null;
  const idx = hourly.time.indexOf(`${date}T12:00`);
  if (idx === -1) return null;
  return hourly[variable]?.[idx] ?? null;
}

function buildChartFromHourly(hourly) {
  if (!hourly?.time) return [];
  const points = [];
  for (let i = 0; i < hourly.time.length; i += 3) {
    const h = hourly.wave_height?.[i] ?? null;
    const p = hourly.swell_wave_period?.[i] ?? null;
    points.push({
      time: hourly.time[i], waveHeightM: round(h, 2), wavePeriodS: round(p, 1),
      waveEnergyKJ: energyFrom(h, p), waveDirectionDeg: hourly.wave_direction?.[i] ?? null,
    });
  }
  return points;
}

// Raffiche da GFS (taratura Windguru, come nel backend): con due modelli
// nella stessa chiamata Open-Meteo suffissa i campi con il nome del modello.
function buildWindChartFromHourly(hourly) {
  if (!hourly?.time) return [];
  const points = [];
  for (let i = 0; i < hourly.time.length; i += 3) {
    const speed = hourly.wind_speed_10m_best_match?.[i];
    const rawGusts = hourly.wind_gusts_10m_gfs_seamless?.[i] ?? hourly.wind_gusts_10m_best_match?.[i];
    points.push({
      time: hourly.time[i],
      windSpeedKn: round(speed, 1),
      windGustsKn: round(gustFloor(rawGusts, speed), 1),
      windDirectionDeg: hourly.wind_direction_10m_best_match?.[i] ?? null,
    });
  }
  return points;
}

async function fetchWeeklyDataFromOpenMeteo(spot) {
  const windUrl = "https://api.open-meteo.com/v1/forecast?" + new URLSearchParams({
    latitude: spot.lat, longitude: spot.lon,
    daily: "wind_speed_10m_max,wind_gusts_10m_max,wind_direction_10m_dominant",
    hourly: "wind_speed_10m,wind_gusts_10m,wind_direction_10m",
    wind_speed_unit: "kn", forecast_days: 7, timezone: "Europe/Rome",
    models: "best_match,gfs_seamless",
  });
  const marineUrl = "https://marine-api.open-meteo.com/v1/marine?" + new URLSearchParams({
    latitude: spot.lat, longitude: spot.lon,
    daily: "wave_height_max,swell_wave_period_max,wave_direction_dominant",
    hourly: "wave_height,swell_wave_period,wave_direction,sea_surface_temperature,sea_level_height_msl",
    forecast_days: 7, timezone: "Europe/Rome",
  });
  const [windResult, marineResult] = await Promise.allSettled([fetchJSON(windUrl), fetchJSON(marineUrl)]);
  if (windResult.status === "rejected") return { days: [], chart: [], windChart: [] };

  const wind = windResult.value;
  const marine = marineResult.status === "fulfilled" ? marineResult.value : null;
  const days = wind.daily.time.map((date, i) => {
    const dHeight = marine?.daily?.wave_height_max?.[i] ?? null;
    return {
      date,
      windSpeed: wind.daily.wind_speed_10m_max_best_match[i],
      windGusts: gustFloor(
        wind.daily.wind_gusts_10m_max_gfs_seamless?.[i] ?? wind.daily.wind_gusts_10m_max_best_match?.[i],
        wind.daily.wind_speed_10m_max_best_match[i]
      ),
      windDir: wind.daily.wind_direction_10m_dominant_best_match[i],
      height: dHeight,
      period: marine?.daily?.swell_wave_period_max?.[i] ?? null,
      waveDir: marine?.daily?.wave_direction_dominant?.[i] ?? null,
      seaState: classifySeaState(dHeight),
      waterTemp: middayValue(marine?.hourly, "sea_surface_temperature", date),
      seaLevel: middayValue(marine?.hourly, "sea_level_height_msl", date),
    };
  });
  const chart = buildChartFromHourly(marine?.hourly);
  const windChart = buildWindChartFromHourly(wind?.hourly);
  // Punteggio surf calcolato in locale (il backend non risponde in questo
  // ramo di fallback): stessa formula di calculateSurfRating, allineando
  // per indice ogni punto onda al punto vento corrispondente — entrambe le
  // serie sono a step di 3 ore sulla stessa griglia oraria.
  if (spot.disciplines.includes("wave")) {
    chart.forEach((p, i) => {
      p.surfRating = calculateSurfRating(p.waveHeightM, p.wavePeriodS, windChart[i]?.windSpeedKn, windChart[i]?.windDirectionDeg, spot.coastOrientationDeg);
    });
  }
  return { days, chart, windChart };
}

// Forecast settimanale: prova prima foamy-backend (/daily — riepilogo giorno
// per giorno, Copernicus reale sui primi giorni + grafico a step di 3 ore
// da Open-Meteo per tutti e 7),
// fallback a Open-Meteo diretto se il backend non risponde in tempo. Il
// backend può metterci fino a ~1-2 minuti la prima volta per uno spot
// (Copernicus a freddo su hosting free-tier) — il timeout qui è solo una
// rete di sicurezza, non un limite stretto per "essere veloci".
async function fetchWeeklyData(spot) {
  try {
    const data = await fetchJSON(`${API_BASE}/api/forecast/${spot.id}/daily`, 90000);
    const days = data.days.map((d) => ({
      date: d.date,
      windSpeed: d.wind.speedKn,
      windGusts: d.wind.gustsKn,
      windDir: d.wind.directionDeg,
      height: d.sea.waveHeightM,
      period: d.sea.wavePeriodS,
      waveDir: d.sea.waveDirectionDeg,
      seaState: classifySeaState(d.sea.waveHeightM),
      waterTemp: d.sea.waterTempC,
      seaLevel: d.sea.seaLevelM,
    }));
    // waveDirectionDeg per punto arriva ora direttamente dal backend
    // (mancava, bug corretto lato server); il fallback sulla direzione del
    // giorno resta solo come rete di sicurezza per risposte più vecchie in
    // cache o comunque incomplete.
    const chart = (data.chart || []).map((p, i) => ({
      time: p.time, waveHeightM: p.waveHeightM, wavePeriodS: p.wavePeriodS,
      waveEnergyKJ: p.waveEnergyKJ ?? energyFrom(p.waveHeightM, p.wavePeriodS),
      waveDirectionDeg: p.waveDirectionDeg ?? days[Math.floor(i / POINTS_PER_DAY)]?.waveDir ?? null,
      surfRating: p.surfRating ?? null,
    }));
    const windChart = (data.windChart || []).map((p) => ({
      time: p.time, windSpeedKn: p.windSpeedKn, windGustsKn: p.windGustsKn, windDirectionDeg: p.windDirectionDeg,
    }));
    return { days, chart, windChart };
  } catch {
    return fetchWeeklyDataFromOpenMeteo(spot);
  }
}

const CARDINAL_16 = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
const CLASSICAL_8 = ["Tramontana","Grecale","Levante","Scirocco","Ostro","Libeccio","Ponente","Maestrale"];
function cardinal16(deg) { return CARDINAL_16[Math.round(deg / 22.5) % 16]; }
function classicalName(deg) { return CLASSICAL_8[Math.round(deg / 45) % 8]; }

function arrowSVG(deg, size) {
  // windDirectionDeg è la direzione da cui soffia il vento (convenzione
  // meteo); la freccia deve invece puntare verso dove il vento sta andando,
  // quindi si ruota di 180° in più. Stessa freccina triangolare usata nei
  // grafici Forecast (vedi directionArrowSVG), solo più grande, invece
  // della vecchia forma a "ago di bussola" — un solo simbolo di direzione
  // per tutta la piattaforma.
  const pointDeg = deg + 180;
  return `
  <div class="arrow-widget" style="width:${size}px">
    <svg width="${size}" height="${size}" viewBox="-8 -8 16 16" role="img" aria-label="Direzione del vento">
      <g class="needle" style="--needle-deg:${pointDeg}deg; transform: rotate(${pointDeg}deg); transform-origin:0 0">
        <path d="M0,-6 L-4,5 L0,2 L4,5 Z" fill="#f4fdfc"/>
      </g>
    </svg>
  </div>`;
}

// Freccina di direzione unica per tutta la piattaforma: stessa forma
// triangolare usata nei grafici a barre vento/onda (SVG nativo lì), qui
// come stringa HTML per i contesti fuori da un canvas SVG già aperto. Il
// chiamante passa già il grado giusto da puntare — per il vento è "dove
// va" (+180 dalla convenzione meteo grezza), per le onde è "da dove
// arriva" (grado grezzo, convenzione oceanografica standard tra i
// surfisti, es. "swell da SW").
function directionArrowSVG(deg, size) {
  if (deg == null) return "";
  const s = size || 14;
  return `<svg width="${s}" height="${s}" viewBox="-8 -8 16 16" style="transform:rotate(${deg}deg);flex-shrink:0"><path d="M0,-6 L-4,5 L0,2 L4,5 Z" fill="currentColor"/></svg>`;
}

// Valore speciale di state.region per la scorciatoia "★ Preferiti" in home:
// mostra gli spot preferiti di TUTTE le regioni insieme, invece di dover
// prima entrare in una regione specifica (i preferiti sono globali, salvati
// in localStorage senza distinzione di regione).
const FAVORITES_VIEW = "__favorites__";
let state = { query: "", favoritesOnly: false, region: null };

const FAV_KEY = "foamy_favorites";
function getFavorites() {
  try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]")); }
  catch { return new Set(); }
}
function isFavorite(id) { return getFavorites().has(id); }
function toggleFavorite(id) {
  const favs = getFavorites();
  if (favs.has(id)) favs.delete(id); else favs.add(id);
  localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));
}

function chipBtn(label, active, onClick) {
  const btn = document.createElement("button");
  btn.className = "chip-btn";
  btn.textContent = label;
  btn.setAttribute("aria-pressed", String(active));
  btn.onclick = onClick;
  return btn;
}

function renderChips() {
  const favEl = document.getElementById("favBar");
  favEl.innerHTML = "";
  favEl.appendChild(chipBtn("★ Preferiti", state.favoritesOnly, () => { state.favoritesOnly = !state.favoritesOnly; render(); }));
}

const CAMERA_ICON_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 8h4l2 3v7a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1h4l2-3h4l2 3Z"/><circle cx="12" cy="14" r="3.2"/></svg>';
function starIconSVG(filled) {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="${filled ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5l2.9 6.1 6.6.9-4.8 4.6 1.2 6.6L12 17.6l-5.9 3.1 1.2-6.6-4.8-4.6 6.6-.9L12 2.5z"/></svg>`;
}

// Ogni spot appartiene a una regione — il backend la fornisce già
// (Puglia/Sicilia), questo fallback serve solo per dati più vecchi che ne
// fossero ancora privi.
function spotRegion(spot) { return spot.region || "Puglia"; }

// Sagoma stilizzata (semplificata a poligono, non un tracciato costiero
// dettagliato) ma derivata da coordinate reali di capi/città di riferimento
// per ogni regione — non va mai disegnata a mano "a occhio": si prendono i
// punti notevoli della costa (capi, città sulla costa) con lon/lat reali,
// si proiettano con x=(lon-lon0)*111*cos(lat_media), y=(lat0-lat)*111 (km,
// nord in alto), e si collegano in ordine costiero. Ciascuna regione ha il
// proprio viewBox, dato che la forma decide la proporzione (Puglia stretta
// e verticale, Sicilia larga e orizzontale). Puglia: sperone del Gargano
// (Vieste) in alto, tacco del Salento che si restringe fino a Leuca in
// fondo, rientranza del golfo di Taranto sul lato Ionio. Sicilia: punti
// reali usati — Capo Peloro/Milazzo (NE), Cefalù/Capo Gallo/golfo di
// Castellammare/Capo San Vito (costa nord, con le due insenature), Trapani/
// Marsala-Capo Lilibeo (punta O), Mazara/Sciacca/Agrigento/Gela (costa
// sud), Punta Secca/Capo Passero (punta SE), Siracusa/Catania/Taormina
// (costa Ionica). Le regioni non ancora mappate usano una sagoma "stivale
// d'Italia" generica come segnaposto, da sostituire con la stessa tecnica
// quando si aggiunge quella regione.
const REGION_MAPS = {
  "Puglia": { viewBox: "0 0 100 156", d: "M85,12 L55,4 L40,18 L48,30 L56,50 L52,72 L56,92 L50,112 L52,130 L42,150 L32,135 L26,115 L38,98 L24,82 L30,62 L18,45 L26,28 Z" },
  "Sicilia": { viewBox: "0 0 286 178", d: "M285,1 L248,0 L141,26 L79,4 L41,24 L27,10 L8,28 L0,52 L15,69 L59,84 L98,109 L160,133 L179,158 L240,177 L253,133 L235,86 L253,47 Z" },
  "_default": { viewBox: "0 0 100 156", d: "M60,4 C72,4 70,16 78,22 C86,28 84,40 76,46 C82,54 80,66 70,70 C74,80 68,92 58,94 C62,104 56,116 46,116 C48,126 40,136 30,132 C24,140 12,138 10,128 C4,124 6,112 14,108 C8,100 12,88 22,86 C16,76 22,64 32,62 C28,50 36,38 48,38 C44,26 52,14 60,4 Z" },
};
function regionMapSVG(name) {
  const map = REGION_MAPS[name] || REGION_MAPS._default;
  return `<svg class="region-map" viewBox="${map.viewBox}" role="img" aria-label="Mappa ${name}"><path d="${map.d}"/></svg>`;
}

function regionCard(name, count) {
  const card = document.createElement("button");
  card.className = "region-card fade-up";
  card.innerHTML = `
    ${regionMapSVG(name)}
    <span class="region-name">${name}</span>
    <span class="region-count">${count} spot</span>
  `;
  card.onclick = () => { state.region = name; state.query = ""; document.getElementById("search").value = ""; render(); };
  return card;
}

function spotCard(spot) {
  const card = document.createElement("button");
  card.className = "spot-card fade-up";
  card.innerHTML = `
    <div class="spot-card-head">
      <span class="spot-card-name">${spot.name}</span>
      <span class="spot-card-badges">
        ${spot.webcam_banner ? `<span class="webcam-badge" title="Webcam disponibile">${CAMERA_ICON_SVG}</span>` : ""}
      </span>
    </div>
    <div class="spot-card-foot">
      <p class="spot-card-cta">Vedi condizioni live →</p>
      <span class="spot-card-fav ${isFavorite(spot.id) ? "is-active" : ""}" role="button" aria-label="Preferito" title="Aggiungi ai preferiti">${starIconSVG(isFavorite(spot.id))}</span>
    </div>
  `;
  card.onclick = (e) => {
    if (e.target.closest(".spot-card-fav")) {
      e.stopPropagation();
      toggleFavorite(spot.id);
      render();
      return;
    }
    openDrawer(spot);
  };
  return card;
}

function render() {
  const regionGrid = document.getElementById("regionGrid");
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  const filtersBar = document.getElementById("filtersBar");
  const backBtn = document.getElementById("backToRegions");
  const favShortcut = document.getElementById("favShortcut");

  if (!state.region) {
    // Livello 1: scelta della regione — niente ricerca/preferiti qui
    // (riguardano gli spot dentro una regione), solo la scorciatoia ai
    // preferiti globali in alto a destra.
    regionGrid.style.display = "grid";
    grid.style.display = "none";
    empty.style.display = "none";
    filtersBar.style.display = "none";
    backBtn.style.display = "none";
    favShortcut.style.display = "inline-block";
    regionGrid.innerHTML = "";
    const counts = new Map();
    SPOTS.forEach(s => { const r = spotRegion(s); counts.set(r, (counts.get(r) || 0) + 1); });
    [...counts.entries()]
      .sort((a, b) => a[0].localeCompare(b[0], "it"))
      .forEach(([name, count]) => regionGrid.appendChild(regionCard(name, count)));
    return;
  }

  // Livello 2: griglia spot — o della regione scelta, o (con la scorciatoia
  // "★ Preferiti" in home) di tutti i preferiti a prescindere dalla
  // regione. Stesso comportamento di ricerca di sempre in entrambi i casi;
  // il chip "★ Preferiti" dentro una regione resta utile per filtrare
  // ulteriormente, ma non ha senso nella vista preferiti (è già tutto
  // filtrato), quindi lì si nasconde.
  const isFavView = state.region === FAVORITES_VIEW;
  regionGrid.style.display = "none";
  filtersBar.style.display = "flex";
  backBtn.style.display = "inline-flex";
  favShortcut.style.display = "none";
  document.getElementById("favBar").style.display = isFavView ? "none" : "flex";
  if (!isFavView) renderChips();
  grid.innerHTML = "";
  const q = state.query.trim().toLowerCase();
  const filtered = SPOTS.filter(s =>
    (isFavView ? isFavorite(s.id) : spotRegion(s) === state.region) &&
    (!q || s.name.toLowerCase().includes(q)) &&
    (!state.favoritesOnly || isFavorite(s.id))
  ).sort((a, b) => a.name.localeCompare(b.name, "it"));
  if (filtered.length === 0) {
    grid.style.display = "none";
    empty.style.display = "block";
    document.getElementById("emptyTitle").textContent = isFavView && !q ? "Nessuno spot preferito" : "Nessuno spot per questi filtri";
    document.getElementById("emptySubtitle").textContent = isFavView && !q ? "Apri uno spot e tocca la stella per aggiungerlo qui." : "Prova a togliere qualche filtro.";
  } else {
    grid.style.display = "grid";
    empty.style.display = "none";
    filtered.forEach(s => grid.appendChild(spotCard(s)));
  }
}
document.getElementById("backToRegions").onclick = () => { state.region = null; state.query = ""; state.favoritesOnly = false; document.getElementById("search").value = ""; render(); };
document.getElementById("favShortcut").onclick = () => { state.region = FAVORITES_VIEW; render(); };
document.getElementById("resetFilters").onclick = () => { state.query = ""; state.favoritesOnly = false; document.getElementById("search").value = ""; render(); };
document.getElementById("search").addEventListener("input", (e) => { state.query = e.target.value; render(); });

function closeDrawer() { document.getElementById("drawerRoot").innerHTML = ""; document.removeEventListener("keydown", escHandler); }
function escHandler(e) { if (e.key === "Escape") closeDrawer(); }

function dayLabel(dateStr, idx) {
  if (idx === 0) return "Oggi";
  if (idx === 1) return "Domani";
  const d = new Date(dateStr + "T12:00:00");
  return d.toLocaleDateString("it-IT", { weekday: "short", day: "numeric" });
}

function tideArrowSVG(rising) {
  const d = rising ? "M12 19V5M5 12l7-7 7 7" : "M12 5v14M5 12l7 7 7-7";
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`;
}

// Punti per giorno di un grafico a step di 3 ore (24h / 3h): usata sia dal
// grafico vento sia da quello onde per i separatori/etichette giorno, così
// restano identiche tra i due invece di generare due copie che potrebbero
// disallinearsi.
const POINTS_PER_DAY = 8;

// Fattore di scala per la larghezza VISUALIZZATA (CSS) dei grafici vento/
// mare sotto i 640px — non tocca viewBox né le costanti di disegno (COL_W
// ecc.), quindi tutta la matematica interna (posizione delle bar, altezze
// riga) resta identica a desktop: si scala solo la dimensione finale in
// px via svgEl_.style.width, esattamente come un'immagine responsive.
// Deliberatamente NON si usa CSS zoom/transform sul contenitore: entrambi
// hanno causato scroll-chaining sull'orizzontale su mobile reale (lo swipe
// sul grafico trascinava tutta la pagina) — ridimensionare la sola <svg>
// con una larghezza CSS più piccola è lo stesso meccanismo di un'immagine
// responsive, quindi scroll/touch nativi del browser restano corretti.
function chartDisplayScale() { return window.innerWidth <= 640 ? 0.72 : 1; }

// Grafico onda a barre — stessa struttura del grafico vento (colonna
// fissa, dati sempre leggibili, scroll orizzontale, stessa freccia
// triangolare). Niente data/ora qui: la condivide con il grafico vento,
// che scorre insieme in un unico contenitore (vedi forecastSectionHTML).
// Ordine dall'alto: bar altezza onda (con l'altezza scritta dentro),
// periodo + energia sotto, direzione, punteggio surf in fondo.
const WAVE3_COL_W = 34;
const WAVE3_BAR_TOP = 4;
const WAVE3_BAR_MAX_H = 90;
const WAVE3_BAR_BASELINE = WAVE3_BAR_TOP + WAVE3_BAR_MAX_H;
const WAVE3_BELOW_ZONE_H = 34; // periodo + energia, sotto la bar
const WAVE3_DIR_TOP = WAVE3_BAR_BASELINE + WAVE3_BELOW_ZONE_H + 2;
const WAVE3_DIR_H = 32;
const WAVE3_CHART_H = WAVE3_DIR_TOP + WAVE3_DIR_H + 3;

// Scala colore altezza onda: le stesse tappe esatte della scala vento
// (WIND_COLOR_STOPS, non punti interpolati a caso lungo il gradiente) così
// ogni fascia mostra un colore identico a quello che il grafico vento
// mostrerebbe a quel kn — bianco / azzurro / verde / giallo / arancio,
// stessa progressione "calmo → forte" leggibile in entrambi i grafici.
function waveBarColor(h) {
  if (h <= 0.4) return windColor(0);   // bianco
  if (h <= 0.9) return windColor(8);   // azzurro
  if (h <= 1.5) return windColor(14);  // verde
  if (h <= 1.9) return windColor(20);  // giallo
  return windColor(27);                // arancio
}
// Stesso trattamento del testo del grafico vento: inchiostro scuro fisso
// su tutte le celle colorate della scala, a prescindere dalla fascia.
function waveBarInk() {
  return WIND2_INK_ON_COLOR;
}

function renderWaveChart(svgEl_, chart) {
  svgEl_.innerHTML = "";
  const n = chart.length;
  if (!n) {
    svgEl_.removeAttribute("style");
    svgEl_.setAttribute("viewBox", `0 0 640 ${WAVE3_CHART_H}`);
    const t = svgElNS("text", { x: 320, y: WAVE3_CHART_H / 2, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-size": 12, fill: "#6b8583" });
    t.textContent = "Dati onda non disponibili";
    svgEl_.appendChild(t);
    return;
  }

  const chartW = n * WAVE3_COL_W;
  svgEl_.setAttribute("viewBox", `0 0 ${chartW} ${WAVE3_CHART_H}`);
  svgEl_.style.width = (chartW * chartDisplayScale()) + "px";
  svgEl_.style.height = "auto";
  svgEl_.style.display = "block";

  const heights = chart.map((p) => p.waveHeightM ?? 0);
  const maxH = Math.max(0.3, ...heights) * 1.2;
  const x = (i) => i * WAVE3_COL_W + WAVE3_COL_W / 2;
  const barH = (v) => (v / maxH) * WAVE3_BAR_MAX_H;

  const barW = WAVE3_COL_W * 0.62;
  for (let i = 0; i < n; i++) {
    const cx = x(i);
    const p = chart[i];
    // "Piatto" quando l'altezza arrotonda a 0.0 alla cifra mostrata (non
    // solo quando è esattamente 0) — altrimenti si vedrebbe una bar
    // minuscola etichettata "0.0", che è proprio il caso FLAT deve evitare.
    const isFlat = heights[i] < 0.05;

    if (isFlat) {
      // Mare piatto: niente bar né periodo, solo la scritta FLAT in bianco,
      // alla stessa altezza a cui atterra il valore delle altre bar quando
      // sono troppo basse per contenerlo (appena sopra la baseline) — così
      // tutte le colonne, con o senza bar, leggono lungo la stessa riga.
      const flatLbl = svgElNS("text", { x: cx, y: (WAVE3_BAR_BASELINE - 3).toFixed(1), "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-weight": 700, "font-size": 9, fill: "#f4fdfc" });
      flatLbl.textContent = "FLAT";
      svgEl_.appendChild(flatLbl);
    } else {
      // Bar altezza onda: colore a fasce discrete, con il valore scritto
      // dentro la bar stessa, vicino alla cima — a meno che la bar non sia
      // troppo bassa per contenerlo (fascia di ~14px sotto la cima), nel
      // qual caso il valore esce sopra la bar invece di sovrapporsi al
      // periodo stampato appena sotto la baseline.
      const h = Math.max(1, barH(heights[i]));
      const yTop = WAVE3_BAR_BASELINE - h;
      const fill = waveBarColor(heights[i]);
      svgEl_.appendChild(svgElNS("rect", {
        x: (cx - barW / 2).toFixed(1), y: yTop.toFixed(1),
        width: barW.toFixed(1), height: h.toFixed(1),
        fill, rx: 2,
      }));
      const labelFits = h >= 14;
      const heightLbl = svgElNS("text", {
        x: cx, y: (labelFits ? yTop + 12 : yTop - 3).toFixed(1),
        "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-weight": 700, "font-size": 9.5,
        fill: labelFits ? waveBarInk(heights[i]) : "#f4fdfc",
      });
      heightLbl.textContent = heights[i].toFixed(1);
      svgEl_.appendChild(heightLbl);

      // Periodo, testo semplice sotto la bar (niente per i punti FLAT).
      const periodLbl = svgElNS("text", { x: cx, y: WAVE3_BAR_BASELINE + 12, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-size": 10, fill: "#9be3de" });
      periodLbl.textContent = p.wavePeriodS != null ? Math.round(p.wavePeriodS) : "—";
      svgEl_.appendChild(periodLbl);
    }

    // Energia, in un piccolo riquadro tabellare, grassetto oltre 100 kJ,
    // niente colore — mostrata anche per i punti FLAT (sarà 0).
    const energyKJ = p.waveEnergyKJ != null ? Math.round(p.waveEnergyKJ) : null;
    const boxY = WAVE3_BAR_BASELINE + 18;
    const boxH = 15;
    svgEl_.appendChild(svgElNS("rect", {
      x: (cx - 15).toFixed(1), y: boxY, width: 30, height: boxH, rx: 2,
      fill: "rgba(244,253,252,0.06)", stroke: "rgba(244,253,252,0.22)", "stroke-width": 1,
    }));
    const energyLbl = svgElNS("text", { x: cx, y: boxY + boxH / 2 + 3.5, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-weight": energyKJ != null && energyKJ > 100 ? 700 : 400, "font-size": 10, fill: "#f4fdfc" });
    energyLbl.textContent = energyKJ != null ? energyKJ : "—";
    svgEl_.appendChild(energyLbl);

    // Direzione in fondo (al posto delle date, condivise col grafico
    // vento sopra): stessa freccia triangolare, ruotata di 180° dal grado
    // grezzo così da puntare verso dove va lo swell, non da dove arriva.
    const dir = p.waveDirectionDeg;
    if (dir != null) {
      const g = svgElNS("g", { transform: `translate(${cx.toFixed(1)},${WAVE3_DIR_TOP + 9}) rotate(${dir + 180})` });
      g.appendChild(svgElNS("path", { d: "M0,-6 L-4,5 L0,2 L4,5 Z", fill: "#f4fdfc" }));
      svgEl_.appendChild(g);

      const dirLbl = svgElNS("text", { x: cx, y: WAVE3_DIR_TOP + 26, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-weight": 600, "font-size": 9, fill: "#9be3de" });
      dirLbl.textContent = cardinal16(dir);
      svgEl_.appendChild(dirLbl);
    }
  }
}

function svgElNS(tag, attrs) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

// Scala colore vento (kn), interpolata con continuità tra le fasce invece
// di scatti netti — es. 22kn cade a metà tra "giallo" (~20) e "arancione"
// (~27), quindi rende come un giallo che vira verso l'arancione.
const WIND_COLOR_STOPS = [
  { kn: 0, rgb: [255, 255, 255] },
  { kn: 5, rgb: [255, 255, 255] },
  { kn: 8, rgb: [79, 209, 197] },
  { kn: 14, rgb: [134, 224, 138] },
  { kn: 20, rgb: [242, 217, 78] },
  { kn: 27, rgb: [242, 153, 78] },
  { kn: 35, rgb: [224, 82, 79] },
  { kn: 45, rgb: [176, 106, 224] },
];
function windColor(kn) {
  const s = WIND_COLOR_STOPS;
  if (kn <= s[0].kn) return rgbCss(s[0].rgb);
  for (let i = 0; i < s.length - 1; i++) {
    if (kn <= s[i + 1].kn) {
      const t = (kn - s[i].kn) / (s[i + 1].kn - s[i].kn);
      return rgbCss(lerpRgb(s[i].rgb, s[i + 1].rgb, t));
    }
  }
  return rgbCss(s[s.length - 1].rgb);
}
function lerpRgb(a, b, t) { return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t]; }
function rgbCss(rgb) { return `rgb(${Math.round(rgb[0])},${Math.round(rgb[1])},${Math.round(rgb[2])})`; }

// Grafico vento denso: colonna a larghezza fissa (non percentuale) per
// ogni punto a 3 ore. Niente barre (esclusive del grafico onda, per non
// averne due identici nello stesso pannello Forecast). Ordine dall'alto:
// data/ora, tabella vento/raffiche, freccia direzione + sigla in fondo.
// Niente hover/tap per vedere i dati: sono già tutti stampati. Il
// contenitore scorre in orizzontale su qualunque schermo — con 56 colonne
// larghe non ci sta mai tutto in una volta, desktop incluso.
const WIND2_COL_W = 34;
const WIND2_DAY_H = 18;       // riga nome giorno, in alto (font ingrandito)
const WIND2_HOUR_H = 16;      // riga ora, sotto il nome giorno (font ingrandito)
const WIND2_TABLE_TOP = WIND2_DAY_H + WIND2_HOUR_H;
const WIND2_CELL_H = 24;      // riga "tabella" vento
const WIND2_GCELL_H = 22;     // riga "tabella" raffiche
const WIND2_TABLE_BOTTOM = WIND2_TABLE_TOP + WIND2_CELL_H + WIND2_GCELL_H;
const WIND2_DIR_ZONE_TOP = WIND2_TABLE_BOTTOM + 7;
const WIND2_DIR_ZONE_H = 32;  // freccia + sigla (N, NE, ...), in fondo
const WIND2_CHART_H = WIND2_DIR_ZONE_TOP + WIND2_DIR_ZONE_H + 3;
const WIND2_INK_ON_COLOR = "#0b0f19";
// Vento e raffiche condividono lo stesso font: stessa famiglia, peso,
// dimensione — le due righe della tabella devono leggersi come coppia.
const WIND2_CELL_FONT = { "font-family": "IBM Plex Mono", "font-weight": 700, "font-size": 12.5 };
// Bordo scuro sottile tra una colonna e l'altra della tabella, per
// separare bene i numeri quando due colonne adiacenti hanno colori simili.
const WIND2_CELL_STROKE = { stroke: "rgba(11,15,25,0.4)", "stroke-width": 1 };
function renderWindChart(svgEl_, windChart) {
  svgEl_.innerHTML = "";
  const n = windChart.length;
  if (!n) {
    svgEl_.removeAttribute("style");
    svgEl_.setAttribute("viewBox", `0 0 640 ${WIND2_CHART_H}`);
    const t = svgElNS("text", { x: 320, y: WIND2_CHART_H / 2, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-size": 12, fill: "#6b8583" });
    t.textContent = "Dati vento non disponibili";
    svgEl_.appendChild(t);
    return;
  }

  const chartW = n * WIND2_COL_W;
  svgEl_.setAttribute("viewBox", `0 0 ${chartW} ${WIND2_CHART_H}`);
  svgEl_.style.width = (chartW * chartDisplayScale()) + "px";
  svgEl_.style.height = "auto";
  svgEl_.style.display = "block";

  const speeds = windChart.map((p) => p.windSpeedKn ?? 0);
  const gusts = windChart.map((p) => p.windGustsKn ?? 0);
  const x = (i) => i * WIND2_COL_W + WIND2_COL_W / 2;

  const totalDays = Math.max(1, Math.round(n / POINTS_PER_DAY));

  for (let i = 0; i < n; i++) {
    const cx = x(i);
    const colX = i * WIND2_COL_W;

    // Ora, in alto insieme al nome del giorno (una per colonna).
    const time = new Date(windChart[i].time);
    const hourLbl = svgElNS("text", { x: cx, y: WIND2_DAY_H + WIND2_HOUR_H - 4, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-size": 10.5, fill: "#6b8583" });
    hourLbl.textContent = String(time.getHours()).padStart(2, "0");
    svgEl_.appendChild(hourLbl);

    // Tabella stile Windguru: due celle piene, vento sopra e raffiche
    // sotto, colorate con la stessa scala del vento, con un bordo sottile
    // tra le colonne per separare bene i numeri.
    svgEl_.appendChild(svgElNS("rect", {
      x: colX, y: WIND2_TABLE_TOP, width: WIND2_COL_W, height: WIND2_CELL_H,
      fill: windColor(speeds[i]), ...WIND2_CELL_STROKE,
    }));
    const speedLbl = svgElNS("text", { x: cx, y: WIND2_TABLE_TOP + WIND2_CELL_H / 2 + 4.4, "text-anchor": "middle", ...WIND2_CELL_FONT, fill: WIND2_INK_ON_COLOR });
    speedLbl.textContent = speeds[i] != null ? Math.round(speeds[i]) : "—";
    svgEl_.appendChild(speedLbl);

    const gy = WIND2_TABLE_TOP + WIND2_CELL_H;
    svgEl_.appendChild(svgElNS("rect", {
      x: colX, y: gy, width: WIND2_COL_W, height: WIND2_GCELL_H,
      fill: windColor(gusts[i]), ...WIND2_CELL_STROKE,
    }));
    const gustLbl = svgElNS("text", { x: cx, y: gy + WIND2_GCELL_H / 2 + 4.4, "text-anchor": "middle", ...WIND2_CELL_FONT, fill: WIND2_INK_ON_COLOR });
    gustLbl.textContent = gusts[i] != null ? Math.round(gusts[i]) : "—";
    svgEl_.appendChild(gustLbl);

    // Direzione in fondo: stessa freccia triangolare usata ovunque nel
    // sito, più sigla (N, NE, ...) della direzione di provenienza.
    const dir = windChart[i].windDirectionDeg;
    if (dir != null) {
      const g = svgElNS("g", { transform: `translate(${cx.toFixed(1)},${WIND2_DIR_ZONE_TOP + 9}) rotate(${dir + 180})` });
      g.appendChild(svgElNS("path", { d: "M0,-6 L-4,5 L0,2 L4,5 Z", fill: "#f4fdfc" }));
      svgEl_.appendChild(g);

      const dirLbl = svgElNS("text", { x: cx, y: WIND2_DIR_ZONE_TOP + 26, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-weight": 600, "font-size": 9, fill: "#9be3de" });
      dirLbl.textContent = cardinal16(dir);
      svgEl_.appendChild(dirLbl);
    }
  }

  for (let d = 0; d < totalDays; d++) {
    const idx = Math.min(d * POINTS_PER_DAY + Math.floor(POINTS_PER_DAY / 2), n - 1);
    const dateStr = windChart[idx].time.slice(0, 10);
    const cx = (d * POINTS_PER_DAY + POINTS_PER_DAY / 2) * WIND2_COL_W;
    const dayLbl = svgElNS("text", { x: cx, y: WIND2_DAY_H - 5, "text-anchor": "middle", "font-family": "IBM Plex Mono", "font-weight": 700, "font-size": 12, fill: "#9be3de" });
    dayLbl.textContent = dayLabel(dateStr, d);
    svgEl_.appendChild(dayLbl);
  }
}

// Indice delle righe dei due grafici, con le stesse costanti (WIND2_*,
// WAVE3_*) usate per disegnarli via SVG — così ogni etichetta resta alla
// stessa altezza esatta della riga a cui si riferisce, senza numeri
// duplicati a mano che potrebbero disallinearsi in futuro.
function forecastLegendHTML() {
  const item = (top, h, label) => `<span class="forecast-legend-item" style="top:${top}px;height:${h}px">${label}</span>`;
  const wavePeriodTop = WAVE3_BAR_BASELINE, wavePeriodH = 18;
  const waveEnergyTop = wavePeriodTop + wavePeriodH, waveEnergyH = WAVE3_DIR_TOP - waveEnergyTop;
  return `
    <div class="forecast-legend-col">
      <p class="forecast-sub-label">Vento</p>
      <div class="forecast-legend-block" style="height:${WIND2_CHART_H}px">
        ${item(WIND2_TABLE_TOP, WIND2_CELL_H, "Velocità (kn)")}
        ${item(WIND2_TABLE_TOP + WIND2_CELL_H, WIND2_GCELL_H, "Raffiche (kn)")}
        ${item(WIND2_DIR_ZONE_TOP, WIND2_DIR_ZONE_H, "Direzione")}
      </div>
      <p class="forecast-sub-label" style="margin-top:10px">Mare</p>
      <div class="forecast-legend-block" style="height:${WAVE3_CHART_H}px">
        ${item(0, WAVE3_BAR_BASELINE, "Altezza onda (m)")}
        ${item(wavePeriodTop, wavePeriodH, "Periodo (s)")}
        ${item(waveEnergyTop, waveEnergyH, "Energia (kJ)")}
        ${item(WAVE3_DIR_TOP, WAVE3_DIR_H + 3, "Direzione")}
      </div>
    </div>
  `;
}

// Vento e mare uniti in un solo banner Forecast, un solo scorrimento
// orizzontale per entrambi (un solo contenitore, invece di due scroll
// indipendenti che potevano disallinearsi) — coerente col banner Live
// unificato sopra. Stesso COL_W e stesso numero di punti in entrambi i
// grafici, quindi i divisori di fine giornata si allineano in x tra le
// due sezioni — vengono però disegnati una sola volta come overlay che
// attraversa entrambe (vedi renderForecastDayDividers), non più come due
// <line> separate per sezione, così la linea è visivamente continua.
function forecastSectionHTML() {
  return `
    <section class="panel panel-forecast">
      <p class="panel-label" style="margin-bottom:4px">Forecast — 7 giorni</p>
      <div class="forecast-body-row">
        ${forecastLegendHTML()}
        <div class="forecast-chart-wrap" id="forecastChartWrap">
          <div class="forecast-day-dividers" id="forecastDayDividers"></div>
          <p class="forecast-sub-label">Vento</p>
          <svg id="windChartSvg"></svg>
          <p class="forecast-sub-label" style="margin-top:10px">Mare</p>
          <svg id="waveChartSvg"></svg>
        </div>
      </div>
    </section>
  `;
}

// Disegna i divisori di fine giornata come overlay unico sopra l'intero
// banner Forecast (dal grafico vento fino in fondo al grafico mare), invece
// che come <line> indipendenti dentro ciascuna <svg>: usa le altezze reali
// misurate a runtime (getBoundingClientRect, che forza un reflow sincrono
// quindi i valori sono già aggiornati) invece di costanti hardcoded, così
// resta corretto anche se in futuro cambiano font/margini delle etichette
// "Vento"/"Mare". La x di ogni divisore usa WIND2_COL_W (== WAVE3_COL_W):
// essendo un figlio position:absolute dentro il contenitore che scrolla in
// orizzontale, si muove insieme alle due <svg> senza bisogno di inseguire
// lo scroll a mano.
function renderForecastDayDividers(wrapEl, windSvgEl, waveSvgEl, windN, waveN) {
  const overlay = wrapEl.querySelector("#forecastDayDividers");
  overlay.innerHTML = "";
  const n = Math.min(windN, waveN);
  if (!n) return;

  const wrapRect = wrapEl.getBoundingClientRect();
  const top = windSvgEl.getBoundingClientRect().top - wrapRect.top + wrapEl.scrollTop;
  const bottom = waveSvgEl.getBoundingClientRect().bottom - wrapRect.top + wrapEl.scrollTop;

  // xd è in unità del viewBox (== px reali solo se le <svg> sono mostrate
  // 1:1); sotto i 640px chartDisplayScale() le rimpicciolisce via CSS
  // width, quindi va applicato lo stesso fattore anche qui — altrimenti
  // questo overlay (un <div>, non dentro l'<svg>) punterebbe a un giorno
  // sbagliato non appena i grafici si rimpiccioliscono.
  const scale = chartDisplayScale();
  const totalDays = Math.max(1, Math.round(n / POINTS_PER_DAY));
  for (let d = 1; d < totalDays; d++) {
    const xd = d * POINTS_PER_DAY * WIND2_COL_W * scale;
    const line = document.createElement("div");
    line.className = "forecast-day-divider-line";
    line.style.left = xd + "px";
    line.style.top = top + "px";
    line.style.height = (bottom - top) + "px";
    overlay.appendChild(line);
  }
}

const THERMOMETER_ICON_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>';

// Webcam ora dentro il pannello Live (sotto vento/swell/marea), non più
// come sezione separata in fondo alla pagina — stesso trattamento a
// divisore (bordo superiore) usato per lo swell/marea qui sopra.
function webcamLiveHTML(spot) {
  const cam = spot.webcam_banner;
  const body = !cam
    ? `<p class="footer-ts" style="text-align:left;padding:2px 0">Nessuna webcam attiva e affidabile per questo spot al momento.</p>`
    : (() => {
        const isVideo = cam.embed_type === "video_mp4";
        return `
          <div class="webcam-row">
            <p class="webcam-provider-name" style="margin:0">${cam.provider}</p>
            ${isVideo ? "" : `<a href="${cam.url}" target="_blank" rel="noopener noreferrer" class="webcam-btn">Apri →</a>`}
          </div>
          ${isVideo ? `<video class="webcam-video" src="${cam.url}" controls preload="none" playsinline style="width:100%;border-radius:8px;margin-top:12px;background:#000"></video>` : ""}
          ${cam.note ? `<p class="footer-ts" style="text-align:left;padding-top:10px;margin:0">${cam.note}</p>` : ""}
        `;
      })();
  return `
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <p class="panel-label" style="margin-bottom:8px">Webcam live</p>
      ${body}
    </div>
  `;
}

let openToken = 0;

function openDrawer(spot) {
  const token = ++openToken;
  const root = document.getElementById("drawerRoot");
  // Riusa la stessa immagine (base64) già caricata per il logo dell'header,
  // invece di duplicarla qui: unica fonte per l'asset.
  const brandMarkSrc = document.querySelector(".brand-mark")?.src || "";
  root.innerHTML = `
    <div class="drawer-overlay">
      <aside class="drawer-panel drawer-in">
        <div class="drawer-head">
          <div class="drawer-head-inner">
            <div class="drawer-title-row">
              <img class="drawer-brand-mark" alt="" src="${brandMarkSrc}">
              <div>
                <p class="drawer-coast">${spot.coast}</p>
                <h2 class="drawer-title">${spot.name}</h2>
              </div>
            </div>
            <button class="drawer-close" id="closeBtn" aria-label="Chiudi pannello">×</button>
          </div>
        </div>
        <div id="drawerBody" class="drawer-body drawer-body-inner">
          <p class="footer-ts" style="padding:48px 0">Caricamento condizioni live…</p>
        </div>
      </aside>
    </div>
  `;
  document.getElementById("closeBtn").onclick = closeDrawer;
  document.addEventListener("keydown", escHandler);

  fetchCurrentConditions(spot)
    .then((current) => {
      if (token !== openToken) return;
      const f = { ...current, energy: current.energy ?? energyFrom(current.height, current.period) };
      document.getElementById("drawerBody").innerHTML = `
        ${currentConditionsHTML(f, spot)}
        <div id="threeDaySection">
          <p class="footer-ts" style="padding:20px 0">Caricamento previsioni 7 giorni…</p>
        </div>
        <p class="footer-ts">Aggiornato alle ${new Date().toLocaleTimeString("it-IT")}</p>
      `;

      fetchWeeklyData(spot)
        .then(({ chart, windChart }) => {
          if (token !== openToken) return;
          document.getElementById("threeDaySection").innerHTML = forecastSectionHTML();
          const windChartSvg = document.getElementById("windChartSvg");
          const waveChartSvg = document.getElementById("waveChartSvg");
          renderWindChart(windChartSvg, windChart || []);
          renderWaveChart(waveChartSvg, chart);
          renderForecastDayDividers(
            document.getElementById("forecastChartWrap"),
            windChartSvg, waveChartSvg,
            (windChart || []).length, (chart || []).length
          );
        })
        .catch(() => {
          if (token !== openToken) return;
          document.getElementById("threeDaySection").innerHTML = `<p class="footer-ts" style="padding:20px 0">Previsioni 7 giorni non disponibili al momento.</p>`;
        });

      // La marea/temperatura acqua arriva via una fetch separata (più lenta
      // di vento/swell) e alimenta solo il banner Live in alto — niente più
      // pannello dedicato in fondo alla pagina. Se fallisce, i campi restano
      // sul placeholder "—" già presente nel markup.
      fetchTideData(spot)
        .then((tide) => {
          if (token !== openToken) return;
          const liveWaterTemp = document.getElementById("liveWaterTemp");
          if (liveWaterTemp) liveWaterTemp.textContent = tide.waterTemp != null ? `${tide.waterTemp}°C` : "—";
          const liveTideLevel = document.getElementById("liveTideLevel");
          if (liveTideLevel) liveTideLevel.textContent = tide.currentLevel != null ? `${tide.currentLevel >= 0 ? "+" : ""}${tide.currentLevel} m` : "—";
          const liveTideLbl = document.getElementById("liveTideLbl");
          if (liveTideLbl) liveTideLbl.textContent = tide.currentLevel != null ? (tide.currentLevel >= 0 ? "Alta" : "Bassa") : "—";
          const liveTideIcon = document.getElementById("liveTideIcon");
          if (liveTideIcon) {
            liveTideIcon.innerHTML = tideArrowSVG(tide.trend === "rising");
            liveTideIcon.className = "water-icon tide-trend " + (tide.trend || "");
          }
        })
        .catch(() => {});
    })
    .catch(() => {
      if (token !== openToken) return;
      document.getElementById("drawerBody").innerHTML = `<p class="footer-ts" style="padding:48px 0">Dati meteo-mare non disponibili al momento.</p>`;
    });
}

render();
// Solo Puglia per ora: la Sicilia (già presente nei dati del backend) è
// tolta temporaneamente dal frontend, ci si lavora più avanti.
loadSpots().then((spots) => { SPOTS = spots.filter((s) => spotRegion(s) === "Puglia"); render(); });

</script>
